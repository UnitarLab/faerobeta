<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>faero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --accent: #1a88d4;
            --accent2: #40b4f0;
            --glass: rgba(255, 255, 255, 0.82);
            --glass-b: rgba(255, 255, 255, 0.9);
            --text: #0a2a4a;
            --text2: #5a9ac0;
            --text3: #7ab0d0;
            --bg: linear-gradient(160deg, #8ecae6 0%, #b8def0 30%, #cceeff 60%, #a8d8ea 100%);
            --card: linear-gradient(160deg, rgba(255, 255, 255, 0.82), rgba(220, 242, 255, 0.78));
            --shadow: 0 6px 24px rgba(80, 160, 220, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        /* ─── HEADER ───────────────────────────────────── */
        .hdr {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(210, 235, 255, 0.82));
            border-bottom: 1px solid var(--glass-b);
            padding: 0 16px;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(80, 160, 220, 0.12);
            position: relative;
        }

        .hdr::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.5)
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1a7ad4, #40b4f0, #80d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .logo span {
            background: linear-gradient(135deg, #40d4a0, #80f0c0);
            -webkit-background-clip: text;
            background-clip: text
        }

        .nav {
            display: flex;
            gap: 2px;
            flex: 1
        }

        .nav-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            cursor: pointer;
            transition: all .15s
        }

        .nav-btn:hover {
            background: rgba(80, 160, 220, 0.12);
            color: var(--text)
        }

        .nav-btn.on {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(200, 235, 255, 0.85));
            border: 1px solid var(--glass-b);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(80, 160, 220, 0.15)
        }

        .hdr-search {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(180, 220, 255, 0.7);
            border-radius: 20px;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 11px;
            color: var(--text);
            outline: none;
            width: 150px
        }

        .hdr-search::placeholder {
            color: var(--text3)
        }

        .hdr-user {
            background: linear-gradient(180deg, #4ab8f4, #1a88d4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(26, 136, 212, 0.4)
        }

        .av-sm {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #80e0ff, #40b4ff);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: #fff
        }

        /* ─── LAYOUT ───────────────────────────────────── */
        .layout {
            display: grid;
            grid-template-columns: 210px 1fr 190px;
            flex: 1;
            overflow: hidden;
            gap: 0
        }

        .col {
            overflow-y: auto;
            padding: 12px 8px
        }

        .col::-webkit-scrollbar {
            width: 4px
        }

        .col::-webkit-scrollbar-thumb {
            background: rgba(120, 180, 220, 0.3);
            border-radius: 2px
        }

        /* ─── GLASS CARD ───────────────────────────────── */
        .gc {
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 10px;
            position: relative
        }

        .gc::before {
            content: '';
            position: absolute;
            top: 0;
            left: -20%;
            right: -20%;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent);
            border-radius: 0 0 50% 50%;
            pointer-events: none
        }

        .gc>* {
            position: relative
        }

        .gc-head {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(180, 220, 255, 0.3);
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .gc-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ab8f4, #1a88d4);
            box-shadow: 0 0 5px rgba(74, 184, 244, 0.6)
        }

        .gc-body {
            padding: 14px
        }

        /* ─── SIDEBAR PROFILE ──────────────────────────── */
        .av {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 16px rgba(26, 136, 212, 0.4);
            position: relative;
            cursor: pointer
        }

        .av::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), transparent);
            border-radius: 50%
        }

        .av-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60e870, #20c040);
            border: 2px solid #fff
        }

        .pname {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            color: var(--text)
        }

        .phandle {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 8px
        }

        .pmood {
            text-align: center;
            font-size: 10px;
            color: var(--text2);
            background: rgba(74, 184, 244, 0.08);
            border: 1px solid rgba(74, 184, 244, 0.2);
            border-radius: 20px;
            padding: 3px 10px;
            margin-bottom: 10px;
            font-style: italic
        }

        .pstats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 10px
        }

        .pstat {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(210, 238, 255, 0.7));
            border: 1px solid var(--glass-b);
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center
        }

        .pstat-n {
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
            display: block
        }

        .pstat-l {
            font-size: 8px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .side-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            transition: all .12s
        }

        .side-item:hover {
            background: rgba(74, 184, 244, 0.1);
            color: var(--text)
        }

        .side-item.on {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(200, 235, 255, 0.8));
            border: 1px solid var(--glass-b);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(80, 160, 220, 0.1)
        }

        .side-ic {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(200, 235, 255, 0.8));
            border: 1px solid rgba(180, 220, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px
        }

        /* ─── FEED ─────────────────────────────────────── */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        /* Compose */
        .compose {
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative
        }

        .compose::before {
            content: '';
            position: absolute;
            top: 0;
            left: -20%;
            right: -20%;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.5), transparent);
            border-radius: 0 0 50% 50%;
            pointer-events: none
        }

        .compose-inner {
            display: flex;
            gap: 10px;
            padding: 14px;
            position: relative
        }

        .compose-av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #80d4ff, #1a88d4);
            border: 2px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: #fff
        }

        .compose-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(180, 220, 255, 0.5);
            border-radius: 10px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            color: var(--text);
            outline: none;
            resize: none;
            min-height: 56px
        }

        .compose-field::placeholder {
            color: var(--text3)
        }

        .compose-foot {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px 12px;
            position: relative
        }

        .ctool {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(210, 235, 255, 0.8));
            border: 1px solid var(--glass-b);
            border-radius: 20px;
            padding: 4px 12px;
            font-family: inherit;
            font-size: 10px;
            font-weight: 700;
            color: var(--text2);
            cursor: pointer;
            transition: filter .1s
        }

        .ctool:hover {
            filter: brightness(0.96)
        }

        .csend {
            margin-left: auto;
            background: linear-gradient(180deg, #4ab8f4, #1a88d4);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 6px 18px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(26, 136, 212, 0.35)
        }

        .csend:hover {
            filter: brightness(1.1)
        }

        /* Types toolbar */
        .compose-types {
            display: flex;
            gap: 4px;
            padding: 0 14px 8px;
            position: relative
        }

        .ctype {
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(180, 220, 255, 0.4);
            background: none;
            font-family: inherit;
            font-size: 10px;
            font-weight: 700;
            color: var(--text2);
            cursor: pointer;
            transition: all .12s
        }

        .ctype.on,
        .ctype:hover {
            background: rgba(74, 184, 244, 0.12);
            border-color: var(--accent);
            color: var(--accent)
        }

        /* Post card */
        .post {
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative
        }

        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: -20%;
            right: -20%;
            height: 40%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), transparent);
            border-radius: 0 0 50% 50%;
            pointer-events: none
        }

        .post-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            position: relative
        }

        .post-av {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            position: relative
        }

        .post-av::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.6), transparent);
            border-radius: 50%
        }

        .post-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text)
        }

        .post-sub {
            font-size: 10px;
            color: var(--text2)
        }

        .post-time {
            margin-left: auto;
            font-size: 10px;
            color: var(--text3)
        }

        .post-body {
            padding: 0 14px 10px;
            font-size: 12px;
            line-height: 1.7;
            color: #1a3a5a;
            position: relative
        }

        .tag {
            color: var(--accent);
            font-weight: 700
        }

        .post-media {
            margin: 0 14px 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            max-height: 300px;
            background: linear-gradient(135deg, #c0e8ff, #a8d8f8);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .post-media img,
        .post-media video {
            width: 100%;
            display: block;
            object-fit: cover
        }

        .post-media-placeholder {
            height: 130px;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 0 14px 10px;
            position: relative
        }

        .ptag {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(200, 235, 255, 0.8));
            border: 1px solid rgba(180, 220, 255, 0.5);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 700;
            color: #2a7ac0;
            cursor: pointer
        }

        .post-foot {
            display: flex;
            border-top: 1px solid rgba(180, 220, 255, 0.25);
            position: relative
        }

        .post-act {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            cursor: pointer;
            border-right: 1px solid rgba(180, 220, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all .12s
        }

        .post-act:last-child {
            border-right: none
        }

        .post-act:hover {
            background: rgba(74, 184, 244, 0.08);
            color: var(--text)
        }

        .post-act.liked {
            color: #e05080
        }

        /* Comments */
        .comments {
            padding: 0 14px 10px;
            position: relative;
            display: none
        }

        .comments.open {
            display: block
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-bottom: 8px
        }

        .comment-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(180, 220, 255, 0.4);
            border-radius: 20px;
            padding: 5px 12px;
            font-family: inherit;
            font-size: 11px;
            color: var(--text);
            outline: none
        }

        .send-comment {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit
        }

        .comment-item {
            display: flex;
            gap: 8px;
            margin-bottom: 6px
        }

        .c-av {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: #fff
        }

        .c-body {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 5px 10px;
            flex: 1;
            font-size: 11px;
            color: var(--text)
        }

        .c-name {
            font-weight: 700;
            margin-bottom: 2px;
            font-size: 10px;
            color: var(--text2)
        }

        /* Music post */
        .music-card {
            background: rgba(26, 136, 212, 0.08);
            border: 1px solid rgba(74, 184, 244, 0.25);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 14px 10px;
            cursor: pointer
        }

        .music-play {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            flex-shrink: 0
        }

        .music-info {
            flex: 1;
            min-width: 0
        }

        .music-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text)
        }

        .music-artist {
            font-size: 10px;
            color: var(--text2)
        }

        /* ─── RIGHT COLUMN ─────────────────────────────── */
        .trend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(180, 220, 255, 0.25);
            cursor: pointer
        }

        .trend-item:last-child {
            border: none
        }

        .tr-rank {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            min-width: 16px
        }

        .tr-tag {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            flex: 1
        }

        .tr-count {
            font-size: 9px;
            color: var(--text3)
        }

        .friend-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px
        }

        .fg-item {
            text-align: center;
            cursor: pointer
        }

        .fg-av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin: 0 auto 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            position: relative
        }

        .fg-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #40d060;
            border: 1.5px solid #fff
        }

        .fg-name {
            font-size: 9px;
            font-weight: 700;
            color: var(--text2)
        }

        /* ─── VIEWS (Feed/Profile/Explore) ────────────── */
        .view {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 12px 8px
        }

        .view.active {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        /* Profile page */
        .profile-banner {
            height: 120px;
            border-radius: 12px;
            margin-bottom: 0;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #a8d8f8, #80c4ee, #6ab8e8)
        }

        .profile-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .profile-banner-edit {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer
        }

        .profile-info {
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px;
            padding: 14px;
            margin-top: -20px;
            position: relative;
            box-shadow: var(--shadow)
        }

        .profile-av-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px
        }

        .profile-av {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 16px rgba(26, 136, 212, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: #fff
        }

        .profile-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 11px;
            color: #fff
        }

        .profile-name {
            font-size: 18px;
            font-weight: 900;
            color: var(--text)
        }

        .profile-handle {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 6px
        }

        .profile-bio {
            font-size: 12px;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.5
        }

        .profile-actions {
            display: flex;
            gap: 8px
        }

        .btn-outline {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: none;
            color: var(--accent);
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all .12s
        }

        .btn-outline:hover {
            background: var(--accent);
            color: #fff
        }

        .btn-solid {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(180deg, #4ab8f4, #1a88d4);
            color: #fff;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer
        }

        /* ─── THEME ADAPTATION ─────────────────────────── */
        body[data-theme="xp-luna"] {
            background: #3a6ea8;
            --card: rgba(236, 233, 216, 0.95);
            --text: #000;
            --text2: #316ac5;
            --text3: #808080;
            --glass-b: #aca899;
            --shadow: inset 0 0 0 1px #aca899
        }

        body[data-theme="y2k"] {
            background: #0a001a;
            --card: rgba(20, 0, 40, 0.85);
            --text: #ffccff;
            --text2: #ff88ff;
            --text3: #aa44aa;
            --glass-b: rgba(255, 0, 255, 0.3);
            --accent: #ff00ff
        }

        body[data-theme="dark-matter"] {
            background: #060610;
            --card: rgba(15, 15, 30, 0.9);
            --text: #ddddf8;
            --text2: #8080d0;
            --text3: #5050a0;
            --glass-b: rgba(80, 80, 200, 0.3);
            --accent: #6060ff
        }

        body[data-theme="geocities"] {
            background: #000080;
            --card: #c0c0c0;
            --text: #000;
            --text2: #000080;
            --text3: #808080;
            --glass-b: #808080;
            --shadow: inset -1px -1px 0 #fff, inset 1px 1px 0 #808080;
            --accent: #000080
        }

        /* ─── MODAL ────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 460px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto
        }

        .modal h3 {
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 14px
        }

        .form-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-row label {
            width: 100px;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
        }

        .form-row input,
        .form-row textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-b);
            border-radius: 10px;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }

        .form-row input:focus,
        .form-row textarea:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26, 136, 212, 0.15);
        }

        .modal-foot {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid rgba(180, 220, 255, 0.3)
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="hdr">
        <div class="logo">fae<span>ro</span></div>
        <div class="nav">

    <!-- LAYOUT -->
    <div class="layout">

        <!-- LEFT SIDEBAR -->
        <div class="col" id="leftCol">
            <div class="gc">
                <div class="gc-body" style="padding-top:18px">
                    <div class="av" id="sideAv" style="background:linear-gradient(135deg,#80d4ff,#1a88d4)">U<div
                            class="av-status"></div>
                    </div>
                    <div class="pname" id="sideName">Aero User</div>

                    <div class="pmood" id="sideMood">somewhere between 2004 and forever</div>
                    <div class="pstats">
                        <div class="pstat"><span class="pstat-n" id="statFriends">42</span><span
                                class="pstat-l">Friends</span></div>
                        <div class="pstat"><span class="pstat-n" id="statPosts">0</span><span
                                class="pstat-l">Posts</span></div>
                        <div class="pstat"><span class="pstat-n" id="statViews">1.2k</span><span
                                class="pstat-l">Views</span></div>
                    </div>
                </div>
            </div>
            <div class="gc">
                <div class="gc-head">
                    <div class="gc-dot"></div>Navigate
                </div>
                <div class="gc-body" style="padding-top:8px;padding-bottom:8px">
                    <div class="side-nav">
                        <div class="side-item on" data-view="feed">
                            <div class="side-ic">&#9728;</div>My Feed
                        </div>
                        <div class="side-item" data-view="explore">
                            <div class="side-ic">&#9670;</div>Explore
                        </div>
                        <div class="side-item" data-view="profile">
                            <div class="side-ic">&#9733;</div>My Profile
                        </div>
                        <div class="side-item" id="openChatBtn">
                            <div class="side-ic">&#9993;</div>Messages
                        </div>
                        <div class="side-item" id="openSettingsBtn">
                            <div class="side-ic">&#9881;</div>Settings
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN FEED -->
        <div class="col" id="mainCol">

            <!-- FEED VIEW -->
            <div class="view active" id="view-feed">
                <!-- Status -->
                <div class="compose" id="composeBox">
                    <div class="compose-inner">
                        <div class="compose-av" id="composeAv">U</div>

                            placeholder="What's on your mind? Share anything..."></textarea>
                    </div>
                    <div class="compose-types" id="postTypeBar">
                        <button class="ctype on" data-type="status">Status</button>
                        <button class="ctype" data-type="image">Image</button>
                        <button class="ctype" data-type="video">Video</button>
                        <button class="ctype" data-type="music">Music</button>

                    </div>
                    <div id="mediaInputArea"></div>
                    <div class="compose-foot">
                        <button class="ctool" id="moodBtn">+ Mood</button>
                        <button class="csend" id="postBtn">Post it !</button>

                </div>
                <!-- Posts -->
                <div id="feedPosts"></div>
            </div>

            <!-- EXPLORE VIEW -->
            <div class="view" id="view-explore">
                <div class="gc">
                    <div class="gc-head">
                        <div class="gc-dot"></div>Explore faero
                    </div>
                    <div class="gc-body">

                            placeholder="Search posts, people, tags...">
                        <div id="explorePosts"></div>

                </div>
            </div>

            <!-- PROFILE VIEW -->
            <div class="view" id="view-profile">
                <div class="profile-banner" id="profileBanner">
                    <button class="profile-banner-edit" id="changeBannerBtn">Change Banner</button>
                    <input type="file" id="bannerFileInput" accept="image/*" style="display:none">
                </div>
                <div class="profile-info">
                    <div class="profile-av-wrap">
                        <div class="profile-av" id="profileAv"
                            style="background:linear-gradient(135deg,#80d4ff,#1a88d4)">U</div>
                        <div class="profile-edit-btn" id="editAvatarBtn" title="Change Avatar">&#9998;</div>
                        <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
                    </div>
                    <div class="profile-name" id="profileName">Aero User</div>
                    <div class="profile-handle" id="profileHandle">@aerouser</div>
                    <div class="profile-bio" id="profileBio">living in glass and gradients...</div>
                    <div class="profile-actions">
                        <button class="btn-solid" id="editProfileBtn">Edit Profile</button>
                        <button class="btn-outline">Share Profile</button>

                </div>
                <div id="profilePosts"></div>
            </div>

        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="col" id="rightCol">
            <div class="gc">
                <div class="gc-head">
                    <div class="gc-dot"></div>Trending
                </div>
                <div class="gc-body" style="padding:8px 14px">
                    <div id="trendingList"></div>
                </div>
            </div>
            <div class="gc">
                <div class="gc-head">
                    <div class="gc-dot" style="background:linear-gradient(135deg,#60e870,#20c040)"></div>Online
                </div>
                <div class="gc-body">
                    <div class="friend-grid" id="friendGrid"></div>
                </div>
            </div>
            <div class="gc">
                <div class="gc-head">
                    <div class="gc-dot" style="background:linear-gradient(135deg,#f4c84a,#d48800)"></div>Now Playing
                </div>
                <div class="gc-body" id="nowPlayingCard" style="font-size:11px;color:var(--text2);font-style:italic">
                    Nothing playing</div>
            </div>
        </div>

    </div>

    <!-- EDIT PROFILE MODAL -->
    <div class="modal-overlay" id="editProfileModal">
        <div class="modal">
            <h3>Edit Profile</h3>
            <div class="form-row"><label>Display Name</label><input id="editName" placeholder="Your name"></div>
            <div class="form-row"><label>Handle</label><input id="editHandle" placeholder="@yourhandle"></div>
            <div class="form-row"><label>Bio</label><textarea id="editBio" placeholder="Tell the world..."></textarea>
            </div>
            <div class="form-row"><label>Mood / Status</label><input id="editMood" placeholder="currently..."></div>
            <div class="form-row"><label>Avatar Gradient</label>
                <div style="display:flex;gap:8px;flex-wrap:wrap" id="gradPicker">
                    <div class="grad-opt" data-grad="linear-gradient(135deg,#80d4ff,#1a88d4)"
                        style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#80d4ff,#1a88d4);cursor:pointer;border:3px solid transparent">
                    </div>
                    <div class="grad-opt" data-grad="linear-gradient(135deg,#f0d0ff,#c060e0)"
                        style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f0d0ff,#c060e0);cursor:pointer;border:3px solid transparent">
                    </div>
                    <div class="grad-opt" data-grad="linear-gradient(135deg,#a0f0c0,#20c080)"
                        style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#a0f0c0,#20c080);cursor:pointer;border:3px solid transparent">
                    </div>
                    <div class="grad-opt" data-grad="linear-gradient(135deg,#ffd080,#e08020)"
                        style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ffd080,#e08020);cursor:pointer;border:3px solid transparent">
                    </div>
                    <div class="grad-opt" data-grad="linear-gradient(135deg,#ffa0b0,#e02060)"
                        style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ffa0b0,#e02060);cursor:pointer;border:3px solid transparent">
                    </div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-outline" id="closeProfileModal">Cancel</button>
                <button class="btn-solid" id="saveProfileBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // ── STATE ────────────────────────────────────────────
        const DB_KEY = 'faero_data';
        let profile = JSON.parse(localStorage.getItem('faero_profile') || 'null') || {
            name: 'Aero User', handle: '@aerouser', bio: 'living in glass and gradients...', mood: 'somewhere between 2004 and forever',
            avatarGrad: 'linear-gradient(135deg,#80d4ff,#1a88d4)', avatarLetter: 'A', friends: 42, views: '1.2k',
            bannerColor: 'linear-gradient(135deg,#a8d8f8,#80c4ee,#6ab8e8)', bannerImage: null
        };
        let posts = JSON.parse(localStorage.getItem('faero_posts') || '[]');
        let currentType = 'status';
        let currentView = 'feed';

        // Demo posts if empty
        if (!posts.length) {
            posts = [
                { id: 1, author: 'cloudrift', handle: '@cloud.rift', grad: 'linear-gradient(135deg,#80e0ff,#1a88d4)', letter: 'C', text: 'finally got the desktop looking exactly right. everything is translucent. perfection.', tags: ['#desktop', '#aero'], likes: 341, liked: false, comments: [], ts: Date.now() - 840000, type: 'status' },
                { id: 2, author: 'glasswave', handle: '@glasswave', grad: 'linear-gradient(135deg,#a0f0c0,#20c080)', letter: 'G', text: 'there is something deeply comforting about a UI that looks like it was designed by someone who genuinely loved gradients', tags: ['#nostalgia', '#web2era'], likes: 2104, liked: false, comments: [{ author: 'prism_sky', grad: 'linear-gradient(135deg,#f0d0ff,#c060e0)', letter: 'P', text: 'this is so real' }], ts: Date.now() - 3600000, type: 'status' },
                { id: 3, author: 'prism_sky', handle: '@prism.sky', grad: 'linear-gradient(135deg,#f0d0ff,#c060e0)', letter: 'P', text: 'just re-downloaded winamp. I know. I know. but also the skin I made in 2006 still works.', tags: ['#winamp', '#2006'], likes: 8812, liked: false, comments: [], ts: Date.now() - 7200000, type: 'music', music: { title: 'Breathe (2am)', artist: 'Anna Nalick', url: '#' } },
            ];
            savePosts();
        }

        // Trending tags
        const trending = ['#frutiger', '#glassui', '#web2era', '#skinculture', '#aerodesign', '#disposable', '#vhs'];
        // Fake friends
        const friends = [
            { name: 'cloudrift', grad: 'linear-gradient(135deg,#80e0ff,#1a88d4)', l: 'C', online: true },
            { name: 'prism_sky', grad: 'linear-gradient(135deg,#f0d0ff,#c060e0)', l: 'P', online: true },
            { name: 'luminos', grad: 'linear-gradient(135deg,#ffe0a0,#f0a020)', l: 'L', online: true },
            { name: 'waverly', grad: 'linear-gradient(135deg,#a0f0d0,#20c080)', l: 'W', online: false },
            { name: 'roseglow', grad: 'linear-gradient(135deg,#ffc0c0,#e04060)', l: 'R', online: true },
            { name: 'drift_v', grad: 'linear-gradient(135deg,#c0d0ff,#6080e0)', l: 'D', online: false }
        ];

        function savePosts() { localStorage.setItem('faero_posts', JSON.stringify(posts)); }
        function saveProfile() { localStorage.setItem('faero_profile', JSON.stringify(profile)); }
        function timeSince(ts) { const d = (Date.now() - ts) / 1000; if (d < 60) return 'just now'; if (d < 3600) return Math.floor(d / 60) + 'm ago'; if (d < 86400) return Math.floor(d / 3600) + 'h ago'; return Math.floor(d / 86400) + 'd ago'; }

        // ── RENDER PROFILE ───────────────────────────────────
        function renderProfile() {
            document.getElementById('sideAv').style.background = profile.avatarGrad;
            document.getElementById('sideAv').textContent = profile.avatarLetter;
            document.getElementById('sideAv').innerHTML += `<div class="av-status"></div>`;
            document.getElementById('sideName').textContent = profile.name;
            document.getElementById('sideHandle').textContent = profile.handle;
            document.getElementById('sideMood').textContent = profile.mood;
            document.getElementById('statFriends').textContent = profile.friends;
            document.getElementById('statViews').textContent = profile.views;
            document.getElementById('hdrAvSm').textContent = profile.avatarLetter;
            document.getElementById('hdrUsername').textContent = profile.handle.replace('@', '');
            document.getElementById('composeAv').textContent = profile.avatarLetter;
            document.getElementById('composeAv').style.background = profile.avatarGrad;
            document.getElementById('profileAv').textContent = profile.avatarLetter;
            document.getElementById('profileAv').style.background = profile.avatarGrad;
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileHandle').textContent = profile.handle;
            document.getElementById('profileBio').textContent = profile.bio;
            document.getElementById('profileBanner').style.background = profile.bannerColor;
            if (profile.bannerImage) document.getElementById('profileBanner').style.backgroundImage = `url(${profile.bannerImage})`;
            // Count own posts
            const myCount = posts.filter(p => p.isOwn).length;
            document.getElementById('statPosts').textContent = myCount;
        }

        // ── RENDER FEED ──────────────────────────────────────
        function renderFeed(container, list) {
            container.innerHTML = '';
            [...list].reverse().forEach(post => {
                container.appendChild(buildPostCard(post));
            });
        }

        function buildPostCard(post) {
            const el = document.createElement('div');
            el.className = 'post'; el.dataset.postId = post.id;
            const letter = post.isOwn ? profile.avatarLetter : post.letter;
            const grad = post.isOwn ? profile.avatarGrad : post.grad;
            const author = post.isOwn ? profile.name : post.author;
            const handle = post.isOwn ? profile.handle : post.handle;
            let mediaHTML = '';
            if (post.image) mediaHTML = `<div class="post-media"><img src="${post.image}" alt="post image"></div>`;
            else if (post.video) mediaHTML = `<div class="post-media"><video src="${post.video}" controls></video></div>`;
            else if (post.type === 'image' && !post.image) mediaHTML = `<div class="post-media"><div class="post-media-placeholder">&#128247;</div></div>`;
            let musicHTML = '';
            if (post.music) musicHTML = `<div class="music-card"><div class="music-play">&#9654;</div><div class="music-info"><div class="music-title">${post.music.title}</div><div class="music-artist">${post.music.artist}</div></div></div>`;
            const tagsHTML = post.tags ? post.tags.map(t => `<span class="ptag">${t}</span>`).join('') : '';
            el.innerHTML = `
    <div class="post-head">
      <div class="post-av" style="background:${grad}">${letter}</div>
      <div><div class="post-name">${author}</div><div class="post-sub">${handle} &mdash; ${timeSince(post.ts)}</div></div>
      <div class="post-time">${post.isOwn ? '<span style="cursor:pointer;color:var(--text3)" data-delete="${post.id}">&#8943;</span>' : ''}</div>
    </div>
    ${post.text ? `<div class="post-body">${post.text.replace(/#(\w+)/g, '<span class="tag">#$1</span>')}</div>` : ''}
    ${mediaHTML}${musicHTML}
    ${tagsHTML ? `<div class="post-tags">${tagsHTML}</div>` : ''}
    <div class="post-foot">
      <div class="post-act ${post.liked ? 'liked' : ''}" data-like="${post.id}">&#9829; ${post.likes}</div>
      <div class="post-act" data-share="${post.id}">&#8645; Share</div>
      <div class="post-act" data-comment-toggle="${post.id}">&#9993; Reply (${post.comments.length})</div>
    </div>
    <div class="comments ${post.showComments ? 'open' : ''}" id="comments-${post.id}">
      <div class="comment-input"><input placeholder="Add a reply..." id="cinput-${post.id}"><button class="send-comment" data-send-comment="${post.id}">Send</button></div>
      <div id="clist-${post.id}">${post.comments.map(c => `<div class="comment-item"><div class="c-av" style="background:${c.grad || 'linear-gradient(135deg,#80d4ff,#1a88d4)'}">${c.letter || c.author[0].toUpperCase()}</div><div class="c-body"><div class="c-name">${c.author}</div>${c.text}</div></div>`).join('')}</div>
    </div>`;
            return el;
        }

        // ── TRENDING / FRIENDS ───────────────────────────────
        function renderTrending() {
            document.getElementById('trendingList').innerHTML = trending.map((t, i) =>
                `<div class="trend-item"><span class="tr-rank">${i + 1}</span><span class="tr-tag">${t}</span><span class="tr-count">${Math.floor(Math.random() * 8 + 1)}.${Math.floor(Math.random() * 9)}k</span></div>`
            ).join('');
        }
        function renderFriends() {
            document.getElementById('friendGrid').innerHTML = friends.map(f =>
                `<div class="fg-item"><div class="fg-av" style="background:${f.grad}">${f.online ? `<div class="fg-dot"></div>` : ''}${f.l}</div><div class="fg-name">${f.name}</div></div>`
            ).join('');
        }

        // ── VIEW SWITCHING ───────────────────────────────────
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('on'));
            document.getElementById('view-' + view)?.classList.add('active');
            document.querySelectorAll(`[data-view="${view}"]`).forEach(b => b.classList.add('on'));
            if (view === 'profile') renderProfileView();
            if (view === 'explore') renderFeed(document.querySelector('#view-explore #explorePosts'), posts.concat(posts).slice(0, 10));
        }

        function renderProfileView() {
            renderFeed(document.getElementById('profilePosts'), posts.filter(p => p.isOwn));
        }

        // ── POST ACTIONS ────────────────────────────────────
        document.addEventListener('click', e => {
            const likeBtn = e.target.closest('[data-like]');
            if (likeBtn) {
                const id = parseInt(likeBtn.dataset.like);
                const post = posts.find(p => p.id === id);
                if (post) { post.liked = !post.liked; post.likes += (post.liked ? 1 : -1); savePosts(); rerenderFeeds(); }
                return;
            }
            const commentToggle = e.target.closest('[data-comment-toggle]');
            if (commentToggle) {
                const id = parseInt(commentToggle.dataset.commentToggle);
                const post = posts.find(p => p.id === id);
                if (post) { post.showComments = !post.showComments; rerenderFeeds(); }
                return;
            }
            const sendComment = e.target.closest('[data-send-comment]');
            if (sendComment) {
                const id = parseInt(sendComment.dataset.sendComment);
                const input = document.getElementById('cinput-' + id);
                if (input && input.value.trim()) {
                    const post = posts.find(p => p.id === id);
                    if (post) { post.comments.push({ author: profile.name, grad: profile.avatarGrad, letter: profile.avatarLetter, text: input.value.trim() }); input.value = ''; savePosts(); rerenderFeeds(); }
                }
                return;
            }
            const shareBtn = e.target.closest('[data-share]');
            if (shareBtn) {
                const id = parseInt(shareBtn.dataset.share);
                const post = posts.find(p => p.id === id);
                if (post) {
                    const np = { ...post, id: Date.now(), isOwn: true, text: `Shared: ${post.text}`, likes: 0, liked: false, comments: [], ts: Date.now() };
                    posts.push(np); savePosts(); rerenderFeeds();
                }
                return;
            }
            const viewBtn = e.target.closest('[data-view]');
            if (viewBtn && (viewBtn.closest('.nav') || viewBtn.closest('.side-nav'))) { switchView(viewBtn.dataset.view); return; }
        });

        function rerenderFeeds() {
            renderFeed(document.getElementById('feedPosts'), posts);
            if (currentView === 'profile') renderProfileView();
        }

        // ── POST TYPES ──────────────────────────────────────
        document.getElementById('postTypeBar').addEventListener('click', e => {
            const btn = e.target.closest('.ctype');
            if (!btn) return;
            document.querySelectorAll('.ctype').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            currentType = btn.dataset.type;
            const area = document.getElementById('mediaInputArea');
            if (currentType === 'image' || currentType === 'video' || currentType === 'gif') {
                area.innerHTML = `<div style="padding:0 14px 8px"><input type="file" accept="${currentType === 'video' ? 'video/*' : 'image/*'}" id="mediaFile" style="font-size:11px;width:100%"></div>`;
            } else if (currentType === 'music') {
                area.innerHTML = `<div style="padding:0 14px 8px;display:flex;gap:6px"><input class="compose-field" id="musicTitle" placeholder="Song title" style="flex:1"><input class="compose-field" id="musicArtist" placeholder="Artist" style="flex:1"></div>`;
            } else if (currentType === 'link') {
                area.innerHTML = `<div style="padding:0 14px 8px"><input class="compose-field" id="linkUrl" placeholder="https://..." style="width:100%"></div>`;
            } else {
                area.innerHTML = '';
            }
        });

        // ── SUBMIT POST ──────────────────────────────────────
        document.getElementById('postBtn').addEventListener('click', async () => {
            const text = document.getElementById('composeText').value.trim();
            if (!text && currentType === 'status') return;
            const newPost = { id: Date.now(), isOwn: true, text, type: currentType, likes: 0, liked: false, comments: [], tags: [], ts: Date.now(), showComments: false };
            const mediaFile = document.getElementById('mediaFile');
            if (mediaFile && mediaFile.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    if (currentType === 'image' || currentType === 'gif') newPost.image = e.target.result;
                    else if (currentType === 'video') newPost.video = e.target.result;
                    posts.push(newPost); savePosts(); rerenderFeeds();
                };
                reader.readAsDataURL(mediaFile.files[0]);
            } else {
                if (currentType === 'music') {
                    newPost.music = { title: document.getElementById('musicTitle')?.value || 'Unknown', artist: document.getElementById('musicArtist')?.value || 'Unknown', url: '#' };
                    // Notify OS for "now playing"
                    parent.postMessage({ type: 'TOAST', text: `Now Playing: ${newPost.music.title} - ${newPost.music.artist}`, icon: '&#9835;' }, '*');
                }
                if (currentType === 'link') newPost.link = document.getElementById('linkUrl')?.value || '';
                posts.push(newPost); savePosts(); rerenderFeeds();
            }
            document.getElementById('composeText').value = '';
            document.getElementById('mediaInputArea').innerHTML = '';
            document.querySelectorAll('.ctype').forEach(b => b.classList.remove('on'));
            document.querySelector('.ctype[data-type="status"]').classList.add('on');
            currentType = 'status';
        });

        // ── MOOD ────────────────────────────────────────────
        document.getElementById('moodBtn').addEventListener('click', () => {
            const mood = prompt('Set your current mood:', profile.mood);
            if (mood !== null) { profile.mood = mood; saveProfile(); renderProfile(); }
        });

        // ── EDIT PROFILE ─────────────────────────────────────
        document.getElementById('editProfileBtn').addEventListener('click', () => {
            document.getElementById('editName').value = profile.name;
            document.getElementById('editHandle').value = profile.handle;
            document.getElementById('editBio').value = profile.bio;
            document.getElementById('editMood').value = profile.mood;
            document.getElementById('editProfileModal').classList.add('open');
        });
        document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('editProfileModal').classList.remove('open'));
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            profile.name = document.getElementById('editName').value || profile.name;
            profile.handle = document.getElementById('editHandle').value || profile.handle;
            profile.bio = document.getElementById('editBio').value || profile.bio;
            profile.mood = document.getElementById('editMood').value || profile.mood;
            saveProfile(); renderProfile();
            document.getElementById('editProfileModal').classList.remove('open');
            parent.postMessage({ type: 'PROFILE_UPDATE', profile }, '*');
        });

        // Gradient picker
        document.getElementById('gradPicker').addEventListener('click', e => {
            const opt = e.target.closest('.grad-opt');
            if (!opt) return;
            document.querySelectorAll('.grad-opt').forEach(g => g.style.border = '3px solid transparent');
            opt.style.border = '3px solid var(--accent)';
            profile.avatarGrad = opt.dataset.grad;
            profile.avatarLetter = profile.name[0].toUpperCase();
            renderProfile();
        });

        // Banner
        document.getElementById('changeBannerBtn').addEventListener('click', () => document.getElementById('bannerFileInput').click());
        document.getElementById('bannerFileInput').addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = ev => { profile.bannerImage = ev.target.result; saveProfile(); renderProfile(); };
            reader.readAsDataURL(f);
        });

        // Avatar
        document.getElementById('editAvatarBtn').addEventListener('click', () => document.getElementById('avatarFileInput').click());
        document.getElementById('avatarFileInput').addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            // Just use letter + grad for now
            profile.avatarLetter = profile.name[0].toUpperCase(); saveProfile(); renderProfile();
        });

        // ── SIDEBAR LINKS ────────────────────────────────────
        document.getElementById('openChatBtn').addEventListener('click', () => parent.postMessage({ type: 'OPEN_APP', appId: 'chat' }, '*'));
        document.getElementById('openSettingsBtn').addEventListener('click', () => parent.postMessage({ type: 'OPEN_APP', appId: 'settings', data: { view: 'faero' } }, '*'));

        // ── INCOMING MESSAGES ─────────────────────────────────
        window.addEventListener('message', e => {
            const msg = e.data; if (!msg || !msg.type) return;
            if (msg.type === 'THEME_CHANGE') document.body.dataset.theme = msg.theme;
            if (msg.type === 'INCOMING_POST') { posts.push(msg.post); savePosts(); rerenderFeeds(); }
            if (msg.type === 'NOW_PLAYING') {
                document.getElementById('nowPlayingCard').innerHTML = `<div class="music-card" style="margin:0"><div class="music-play">&#9654;</div><div class="music-info"><div class="music-title">${msg.track}</div><div class="music-artist">${msg.artist}</div></div></div>`;
            }
        });

        // ── INIT ──────────────────────────────────────────────
        // Apply saved theme
        const savedTheme = parent.document?.body?.dataset?.theme || localStorage.getItem('faero_theme_current') || 'frutiger-aero';
        document.body.dataset.theme = savedTheme;
        renderProfile();
        renderFeed(document.getElementById('feedPosts'), posts);
        renderTrending();
        renderFriends();
        // Open Chat links
        document.querySelectorAll('.side-item').forEach(el => {
            if (!el.id) el.addEventListener('click', () => el.dataset.view && switchView(el.dataset.view));
        });
    </script>
</body>

</html>
