<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --accent: #f04060;
            --glass-b: rgba(255, 255, 255, 0.9);
            --text: #0a2a4a;
            --text2: #5a9ac0;
            --text3: #7ab0d0;
            --bg: linear-gradient(160deg, #8ecae6, #cceeff);
            --card: linear-gradient(160deg, rgba(255, 255, 255, 0.82), rgba(220, 242, 255, 0.78));
            --shadow: 0 4px 20px rgba(80, 160, 220, 0.15)
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text)
        }

        .hdr {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(210, 235, 255, 0.85));
            border-bottom: 1px solid var(--glass-b);
            padding: 0 12px;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0
        }

        .hdr-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            flex: 1
        }

        .online-badge {
            font-size: 10px;
            font-weight: 700;
            color: #40d060;
            background: rgba(32, 192, 64, 0.1);
            border: 1px solid rgba(32, 192, 64, 0.3);
            border-radius: 20px;
            padding: 2px 8px
        }

        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 200px 1fr;
            overflow: hidden
        }

        /* Buddy list */
        .buddylist {
            background: rgba(255, 255, 255, 0.3);
            border-right: 1px solid rgba(180, 220, 255, 0.3);
            overflow-y: auto;
            display: flex;
            flex-direction: column
        }

        .buddylist-head {
            padding: 10px 12px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text2);
            border-bottom: 1px solid rgba(180, 220, 255, 0.2)
        }

        .buddy {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            cursor: pointer;
            transition: background .1s;
            border-bottom: 1px solid rgba(180, 220, 255, 0.1)
        }

        .buddy:hover {
            background: rgba(74, 184, 244, 0.08)
        }

        .buddy.active {
            background: rgba(74, 184, 244, 0.15);
            border-right: 2px solid var(--accent)
        }

        .buddy-av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.9)
        }

        .buddy-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.9)
        }

        .buddy-dot.online {
            background: #40d060
        }

        .buddy-dot.away {
            background: #f0c040
        }

        .buddy-dot.busy {
            background: #f04060
        }

        .buddy-dot.offline {
            background: #a0a0a0
        }

        .buddy-info {
            flex: 1;
            min-width: 0
        }

        .buddy-name {
            font-size: 11px;
            font-weight: 800;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .buddy-status {
            font-size: 9px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-style: italic
        }

        .buddy-icon {
            font-size: 16px;
            flex-shrink: 0
        }

        /* Running man icon */
        .running-man {
            animation: runningMan 0.5s steps(2) infinite
        }

        @keyframes runningMan {
            0% {
                content: '&#127939;'
            }

            100% {
                content: '&#127938;'
            }
        }

        /* Chat area */
        .chat-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1)
        }

        .chat-header {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(210, 235, 255, 0.6));
            border-bottom: 1px solid rgba(180, 220, 255, 0.3);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0
        }

        .chat-header .buddy-av {
            width: 36px;
            height: 36px
        }

        .chat-header-name {
            font-size: 14px;
            font-weight: 900;
            color: var(--text)
        }

        .chat-header-status {
            font-size: 10px;
            color: var(--text2);
            font-style: italic
        }

        .chat-actions {
            margin-left: auto;
            display: flex;
            gap: 6px
        }

        .chat-action-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid rgba(180, 220, 255, 0.5);
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all .1s;
            color: var(--text2)
        }

        .chat-action-btn:hover {
            background: var(--card);
            color: var(--text)
        }

        .chat-action-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .chat-action-btn.disabled::after {
            content: ' (coming soon)'
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .messages::-webkit-scrollbar {
            width: 4px
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(120, 180, 220, 0.3);
            border-radius: 2px
        }

        .msg-wrap {
            display: flex;
            gap: 8px;
            align-items: flex-end
        }

        .msg-wrap.own {
            flex-direction: row-reverse
        }

        .msg-av {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: #fff;
            border: 1.5px solid rgba(255, 255, 255, 0.8)
        }

        .msg-bubble {
            max-width: 65%;
            background: var(--card);
            border: 1px solid var(--glass-b);
            border-radius: 16px 16px 16px 4px;
            padding: 8px 12px;
            box-shadow: var(--shadow)
        }

        .msg-wrap.own .msg-bubble {
            background: linear-gradient(135deg, rgba(74, 184, 244, 0.2), rgba(26, 136, 212, 0.15));
            border-radius: 16px 16px 4px 16px;
            border-color: rgba(74, 184, 244, 0.3)
        }

        .msg-author {
            font-size: 9px;
            font-weight: 800;
            color: var(--text2);
            margin-bottom: 3px
        }

        .msg-text {
            font-size: 12px;
            color: var(--text);
            line-height: 1.5
        }

        .msg-time {
            font-size: 9px;
            color: var(--text3);
            margin-top: 3px;
            text-align: right
        }

        .msg-system {
            text-align: center;
            font-size: 10px;
            color: var(--text3);
            font-style: italic;
            padding: 4px 0
        }

        /* Input */
        .chat-input-area {
            background: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(180, 220, 255, 0.3);
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(180, 220, 255, 0.5);
            border-radius: 20px;
            padding: 8px 14px;
            font-family: inherit;
            font-size: 12px;
            color: var(--text);
            outline: none
        }

        .chat-input::placeholder {
            color: var(--text3)
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(180deg, var(--accent), #c02040);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(240, 64, 96, 0.4)
        }

        .send-btn:hover {
            filter: brightness(1.1)
        }

        /* No chat selected */
        .no-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text3)
        }

        .no-chat-icon {
            font-size: 48px;
            margin-bottom: 12px
        }

        /* Video call overlay */
        .call-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px
        }

        .call-overlay.open {
            display: flex
        }

        .call-box {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            color: #fff
        }

        .call-av {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            border: 3px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .call-name {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 6px
        }

        .call-status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 24px
        }

        .call-btns {
            display: flex;
            gap: 16px;
            justify-content: center
        }

        .call-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            cursor: pointer;
            transition: transform .1s
        }

        .call-btn:hover {
            transform: scale(1.1)
        }

        .call-btn.accept {
            background: #40d060
        }

        .call-btn.decline {
            background: #f04040
        }

        .call-btn.end {
            background: #f04040
        }

        body[data-theme="y2k"] {
            --bg: #0a001a;
            --card: rgba(20, 0, 40, .85);
            --text: #ffccff;
            --text2: #ff88ff;
            --text3: #aa44aa;
            --glass-b: rgba(255, 0, 255, 0.3);
            --accent: #ff00ff
        }

        body[data-theme="dark-matter"] {
            --bg: #060610;
            --card: rgba(15, 15, 30, .9);
            --text: #ddddf8;
            --text2: #8080d0;
            --text3: #5050a0;
            --glass-b: rgba(80, 80, 200, 0.3);
            --accent: #6060ff
        }

        body[data-theme="xp-luna"] {
            --bg: #3a6ea8;
            --card: rgba(236, 233, 216, .95);
            --text: #000;
            --text2: #316ac5;
            --text3: #808080;
            --glass-b: #aca899
        }

        body[data-theme="geocities"] {
            --bg: #000080;
            --card: #c0c0c0;
            --text: #000;
            --text2: #000080;
            --text3: #808080;
            --glass-b: #808080;
            --accent: #000080
        }
    </style>
</head>

<body>
    <div class="hdr">
        <span style="font-size:22px">&#128172;</span>
        <div class="hdr-title">Chat</div>
        <div class="online-badge">3 online</div>
    </div>
    <div class="layout">
        <!-- Buddy list -->
        <div class="buddylist">
            <div class="buddylist-head">&#127939; Buddy List</div>
            <div id="buddyList"></div>
        </div>
        <!-- Chat main -->
        <div class="chat-area" id="chatArea">
            <div class="no-chat" id="noChat">
                <div class="no-chat-icon">&#128172;</div>
                <div style="font-size:14px;font-weight:700">Select a buddy to chat</div>
                <div style="font-size:11px;margin-top:6px">Your AeroNet friends are here</div>
            </div>
            <div class="chat-header" id="chatHeader" style="display:none">
                <div class="buddy-av" id="activeAv"></div>
                <div>
                    <div class="chat-header-name" id="activeName"></div>
                    <div class="chat-header-status" id="activeStatus"></div>
                </div>
                <div class="chat-actions">
                    <div class="chat-action-btn" id="audioCallBtn" title="Audio Call">&#128222;</div>
                    <div class="chat-action-btn" id="videoCallBtn" title="Video Call">&#128249;</div>
                    <div class="chat-action-btn" id="groupChatBtn" title="Group Chat">&#128101;</div>
                </div>
            </div>
            <div class="messages" id="messages" style="display:none"></div>
            <div class="chat-input-area" id="chatInputArea" style="display:none">
                <input class="chat-input" id="chatInput" placeholder="Type a message... &#9829;">
                <button class="send-btn" id="sendBtn">&#9658;</button>
            </div>
        </div>
    </div>

    <!-- Call overlay -->
    <div class="call-overlay" id="callOverlay">
        <div class="call-box">
            <div class="call-av" id="callAv"></div>
            <div class="call-name" id="callName"></div>
            <div class="call-status" id="callStatus">Calling...</div>
            <div class="call-btns">
                <button class="call-btn accept" id="callAccept">&#9990;</button>
                <button class="call-btn decline" id="callDecline">&#128222;</button>
            </div>
        </div>
    </div>

    <script>
        const BUDDIES = [
            { id: 'cloudrift', name: 'cloudrift', screenName: 'xXcloudriftXx', grad: 'linear-gradient(135deg,#80e0ff,#1a88d4)', l: 'C', status: 'online', mood: 'watching the gradient skies', icon: '&#127939;' },
            { id: 'prism_sky', name: 'prism_sky', screenName: 'prism_skyyyy', grad: 'linear-gradient(135deg,#f0d0ff,#c060e0)', l: 'P', status: 'away', mood: 'brb compiling my feelings', icon: '&#128694;' },
            { id: 'luminos', name: 'luminos', screenName: 'lum1nos0s', grad: 'linear-gradient(135deg,#ffe0a0,#f0a020)', l: 'L', status: 'online', mood: 'vibing since 2003', icon: '&#127939;' },
            { id: 'waverly', name: 'waverly', screenName: 'waverly_waves', grad: 'linear-gradient(135deg,#a0f0d0,#20c080)', l: 'W', status: 'offline', mood: '', icon: '' },
            { id: 'roseglow', name: 'roseglow', screenName: 'r0seglow99', grad: 'linear-gradient(135deg,#ffc0c0,#e04060)', l: 'R', status: 'online', mood: 'on the internet forever', icon: '&#127939;' },
        ];

        const CANNED = [
            'lol ok',
            'omg yes same!!',
            'wait really???',
            'brb',
            'haha true',
            'this is so real',
            'noooo way',
            'ok but actually',
            '&#9829;&#9829;&#9829;',
            'vibes only rn'
        ];

        let conversations = {};
        let activeBuddy = null;
        let myInfo = { name: 'you', grad: 'linear-gradient(135deg,#80d4ff,#1a88d4)', l: 'Y' };

        // Load profile
        try { const p = JSON.parse(localStorage.getItem('aeronet_profile') || '{}'); if (p.name) { myInfo.name = p.name; myInfo.grad = p.avatarGrad || myInfo.grad; myInfo.l = (p.avatarLetter || p.name[0]).toUpperCase(); } } catch (e) { }

        function ts() { const n = new Date(); return n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0'); }

        function renderBuddyList() {
            const list = document.getElementById('buddyList');
            list.innerHTML = '';
            BUDDIES.forEach(b => {
                const el = document.createElement('div');
                el.className = 'buddy' + (activeBuddy === b.id ? ' active' : '');
                el.innerHTML = `<div class="buddy-av" style="background:${b.grad}">${b.l}<div class="buddy-dot ${b.status}"></div></div><div class="buddy-info"><div class="buddy-name">${b.name} <span style="font-size:9px;color:var(--text3)">${b.screenName || ''}</span></div><div class="buddy-status">${b.icon} ${b.mood || b.status}</div></div>`;
                el.addEventListener('click', () => openChat(b));
                list.appendChild(el);
            });
        }

        function openChat(buddy) {
            activeBuddy = buddy.id;
            if (!conversations[buddy.id]) conversations[buddy.id] = [];
            renderBuddyList();
            document.getElementById('noChat').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('activeAv').style.background = buddy.grad;
            document.getElementById('activeAv').textContent = buddy.l;
            document.getElementById('activeName').textContent = buddy.name + ' (' + buddy.screenName + ')';
            document.getElementById('activeStatus').textContent = buddy.status === 'online' ? '&#127939; Online - ' + buddy.mood : buddy.status;
            renderMessages();
            // Add greeting if new
            if (!conversations[buddy.id].length) {
                conversations[buddy.id].push({ from: 'them', text: 'hey!! whats up &#128075;', time: ts() });
                setTimeout(() => { conversations[buddy.id].push({ from: 'them', text: buddy.mood || 'just here vibing', time: ts() }); renderMessages(); }, 1200);
                renderMessages();
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const conv = conversations[activeBuddy] || [];
            const buddy = BUDDIES.find(b => b.id === activeBuddy);
            container.innerHTML = '<div class="msg-system">Conversation started &mdash; ' + new Date().toLocaleDateString() + '</div>';
            conv.forEach(m => {
                const isOwn = m.from === 'me';
                const div = document.createElement('div');
                div.className = 'msg-wrap' + (isOwn ? ' own' : '');
                div.innerHTML = `<div class="msg-av" style="background:${isOwn ? myInfo.grad : buddy.grad}">${isOwn ? myInfo.l : buddy.l}</div><div class="msg-bubble"><div class="msg-author">${isOwn ? myInfo.name : buddy.name}</div><div class="msg-text">${m.text}</div><div class="msg-time">${m.time}</div></div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !activeBuddy) return;
            if (!conversations[activeBuddy]) conversations[activeBuddy] = [];
            conversations[activeBuddy].push({ from: 'me', text, time: ts() });
            input.value = '';
            renderMessages();
            // Auto reply after delay
            setTimeout(() => {
                const reply = CANNED[Math.floor(Math.random() * CANNED.length)];
                conversations[activeBuddy].push({ from: 'them', text: reply, time: ts() });
                renderMessages();
            }, 800 + Math.random() * 2000);
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

        // Call
        document.getElementById('audioCallBtn').addEventListener('click', () => startCall('audio'));
        document.getElementById('videoCallBtn').addEventListener('click', () => startCall('video'));
        document.getElementById('groupChatBtn').addEventListener('click', () => {
            parent.postMessage({ type: 'TOAST', text: 'Group Chat: coming soon!', icon: '&#128101;' }, '*');
        });

        function startCall(type) {
            const buddy = BUDDIES.find(b => b.id === activeBuddy);
            if (!buddy) return;
            const overlay = document.getElementById('callOverlay');
            document.getElementById('callAv').style.background = buddy.grad;
            document.getElementById('callAv').textContent = buddy.l;
            document.getElementById('callName').textContent = buddy.name;
            document.getElementById('callStatus').textContent = type === 'video' ? 'Video calling...' : 'Calling...';
            overlay.classList.add('open');
            // Auto-simulate answer
            setTimeout(() => {
                document.getElementById('callStatus').textContent = 'Connected (simulated)';
                document.getElementById('callAccept').style.display = 'none';
            }, 2000);
        }
        document.getElementById('callDecline').addEventListener('click', () => {
            document.getElementById('callOverlay').classList.remove('open');
            document.getElementById('callAccept').style.display = '';
        });
        document.getElementById('callAccept').addEventListener('click', () => {
            document.getElementById('callStatus').textContent = 'Connected!';
            document.getElementById('callAccept').style.display = 'none';
        });

        window.addEventListener('message', e => {
            if (e.data?.type === 'THEME_CHANGE') document.body.dataset.theme = e.data.theme;
        });
        document.body.dataset.theme = parent.document?.body?.dataset?.theme || 'frutiger-aero';
        renderBuddyList();
    </script>
</body>

</html>
