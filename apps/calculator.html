<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>AeroCalc</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #1a88d4;
            --bg: #e5f0f9;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.5);
            --btn-bg: linear-gradient(180deg, #fefefe, #e5e5e5);
            --btn-op-bg: linear-gradient(180deg, #f5fafd, #d6e9f5);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            user-select: none;
        }

        .calc-display {
            background: #fff;
            border: 1px solid #a9b8c2;
            border-radius: 4px;
            height: 64px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 0 12px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .history {
            font-size: 11px;
            color: #888;
            height: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .btn {
            border: 1px solid #adb9c5;
            border-radius: 4px;
            background: var(--btn-bg);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            box-shadow: 0 1px 0 #fff inset, 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 4px rgba(26, 136, 212, 0.3);
        }

        .btn:active {
            background: #dcdcdc;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15);
            transform: translateY(1px);
        }

        .btn.op {
            background: var(--btn-op-bg);
            color: #0b4e7c;
        }

        .btn.equal {
            background: linear-gradient(180deg, #4ab8f4, #1a88d4);
            color: #fff;
            border-color: #0d609a;
            grid-row: span 2;
        }

        .btn.equal:hover {
            filter: brightness(1.1);
        }

        .btn.zero {
            grid-column: span 2;
        }
    </style>
</head>

<body>
    <div class="calc-display">
        <div class="history" id="history"></div>
        <div class="current" id="current">0</div>
    </div>
    <div class="grid">
        <button class="btn op" onclick="clearCalc()">C</button>
        <button class="btn op" onclick="backspace()">DEL</button>
        <button class="btn op" onclick="setOp('/')">/</button>
        <button class="btn op" onclick="setOp('*')">×</button>

        <button class="btn" onclick="addNum('7')">7</button>
        <button class="btn" onclick="addNum('8')">8</button>
        <button class="btn" onclick="addNum('9')">9</button>
        <button class="btn op" onclick="setOp('-')">-</button>

        <button class="btn" onclick="addNum('4')">4</button>
        <button class="btn" onclick="addNum('5')">5</button>
        <button class="btn" onclick="addNum('6')">6</button>
        <button class="btn op" onclick="setOp('+')">+</button>

        <button class="btn" onclick="addNum('1')">1</button>
        <button class="btn" onclick="addNum('2')">2</button>
        <button class="btn" onclick="addNum('3')">3</button>
        <button class="btn equal" onclick="calculate()">=</button>

        <button class="btn zero" onclick="addNum('0')">0</button>
        <button class="btn" onclick="addNum('.')">.</button>
    </div>

    <script>
        let currentVal = '0';
        let prevVal = '';
        let op = null;
        let shouldReset = false;

        const display = document.getElementById('current');
        const history = document.getElementById('history');

        function updateDisplay() {
            display.textContent = currentVal.substring(0, 12);
        }

        function addNum(n) {
            if (shouldReset) {
                currentVal = '';
                shouldReset = false;
            }
            if (n === '.' && currentVal.includes('.')) return;
            if (currentVal === '0' && n !== '.') currentVal = n;
            else currentVal += n;
            updateDisplay();
        }

        function setOp(o) {
            if (op !== null) calculate();
            prevVal = currentVal;
            op = o;
            shouldReset = true;
            history.textContent = `${prevVal} ${o}`;
        }

        function calculate() {
            if (op === null || shouldReset) return;
            let res;
            const p = parseFloat(prevVal);
            const c = parseFloat(currentVal);
            switch (op) {
                case '+': res = p + c; break;
                case '-': res = p - c; break;
                case '*': res = p * c; break;
                case '/': res = p / c; break;
            }
            history.textContent = `${prevVal} ${op} ${currentVal} =`;
            currentVal = res.toString();
            op = null;
            shouldReset = true;
            updateDisplay();
        }

        function clearCalc() {
            currentVal = '0';
            prevVal = '';
            op = null;
            history.textContent = '';
            updateDisplay();
        }

        function backspace() {
            if (currentVal.length > 1) currentVal = currentVal.slice(0, -1);
            else currentVal = '0';
            updateDisplay();
        }

        // Global keys
        document.addEventListener('keydown', e => {
            if (e.key >= '0' && e.key <= '9') addNum(e.key);
            if (e.key === '.') addNum('.');
            if (['+', '-', '*', '/'].includes(e.key)) setOp(e.key);
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearCalc();
            if (e.key === 'Backspace') backspace();
        });
    </script>
</body>

</html>
