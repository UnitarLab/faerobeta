<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PlayStation Emulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=VT323&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ps-bg: #2b2b2b;
            --ps-accent: #e0e0e0;
            --ps-shadow: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--ps-bg);
            color: var(--ps-accent);
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #psHeader {
            padding: 10px 20px;
            background: linear-gradient(180deg, #333 0%, #222 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #psHeader h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ddd;
            text-transform: uppercase;
        }

        #mainContainer {
            flex: 1;
            display: flex;
            position: relative;
        }

        #sidebar {
            width: 260px;
            background: #252525;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        #romList {
            flex: 1;
            overflow-y: auto;
            margin: 10px 0;
        }

        .rom-item {
            padding: 10px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .rom-item:hover {
            background: #444;
            transform: translateX(5px);
        }

        .rom-item.active {
            background: #4a4a4a;
            border-color: #0078d4;
        }

        .rom-icon {
            font-size: 24px;
        }

        .rom-name {
            font-weight: 700;
            font-size: 13px;
        }

        .rom-size {
            font-size: 11px;
            opacity: 0.6;
        }

        #emuContainer {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #psShell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #emuJSContainer {
            width: 100%;
            height: 100%;
            display: none;
        }

        .btn {
            background: linear-gradient(180deg, #555 0%, #333 100%);
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .btn:hover {
            background: #666;
        }

        #watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.2;
            font-size: 40px;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="psHeader">
        <h1>PlayStation</h1>
        <button class="btn" onclick="document.getElementById('romInput').click()">Upload Disk</button>
        <input type="file" id="romInput" style="display:none" accept=".bin,.cue,.iso,.chd">
    </div>

    <div id="mainContainer">
        <div id="sidebar">
            <div style="font-size: 12px; opacity: 0.8; margin-bottom: 5px;">MEMORY CARD SLOT 1</div>
            <div id="romList">
                <!-- ROMs will be listed here -->
            </div>
            <div style="font-size: 11px; opacity: 0.5; margin-top: 10px;">Select a game to start emulation.</div>
        </div>
        <div id="emuContainer">
            <div id="psShell">
                <div style="text-align: center; opacity: 0.3;">
                    <div style="font-size: 80px;">&#9634; &#9651; &#9587; &#9711;</div>
                    <div style="font-size: 14px; letter-spacing: 4px;">INSERT DISC</div>
                </div>
            </div>
            <div id="emuJSContainer"></div>
            <div id="watermark">PSX</div>
        </div>
    </div>

    <script>
        const DEMO_ROMS = [
            { name: 'Homebrew Demo', file: '', size: 'N/A', type: 'psx', note: 'Upload your own!' },
        ];
        let userRoms = JSON.parse(localStorage.getItem('psx_roms') || '[]');
        let activeRom = null;

        function renderRomList() {
            const list = document.getElementById('romList');
            const allRoms = [...DEMO_ROMS, ...userRoms];
            list.innerHTML = '';
            allRoms.forEach((r, i) => {
                const el = document.createElement('div');
                el.className = 'rom-item' + (activeRom === r.name ? ' active' : '');
                el.innerHTML = `<div class="rom-icon">&#128191;</div><div><div class="rom-name">${r.name}</div><div class="rom-size">${r.size}</div></div>`;
                el.addEventListener('click', () => loadRom(r));
                list.appendChild(el);
            });
        }

        function loadRom(rom) {
            activeRom = rom.name;
            renderRomList();

            document.getElementById('psShell').style.display = 'none';
            loadEmulatorJS(rom);
            parent.postMessage({ type: 'TOAST', text: `Disc Loaded: ${rom.name}`, icon: '&#128191;' }, '*');
        }

        function loadEmulatorJS(rom) {
            const container = document.getElementById('emuJSContainer');
            container.style.display = 'block';
            container.innerHTML = `<div id="game"></div>`;

            window.EJS_player = '#game';
            window.EJS_gameUrl = rom.dataURL || rom.file;
            window.EJS_core = 'pcsx_rearmed'; // High compatibility core
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';

            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
            document.head.appendChild(script);
        }

        document.getElementById('romInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const newRom = {
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    size: (file.size / 1024 / 1024).toFixed(1) + 'MB',
                    type: 'psx',
                    dataURL: ev.target.result
                };
                userRoms.push(newRom);
                localStorage.setItem('psx_roms', JSON.stringify(userRoms));
                renderRomList();
                loadRom(newRom);
            };
            reader.readAsDataURL(file);
        });

        renderRomList();
    </script>
</body>

</html>
