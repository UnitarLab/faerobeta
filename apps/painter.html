<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Painter</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --accent: #1a88d4;
            --glass-b: rgba(255, 255, 255, 0.9);
            --text: #0a2a4a;
            --text2: #5a9ac0;
            --text3: #7ab0d0;
            --bg: linear-gradient(160deg, #8ecae6, #cceeff);
            --card: rgba(255, 255, 255, 0.9);
            --panel: #f0f4f8
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text)
        }

        /* Menubar */
        .menubar {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(220, 240, 255, 0.85));
            border-bottom: 1px solid var(--glass-b);
            padding: 0 8px;
            height: 36px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(80, 160, 220, 0.1)
        }

        .menu-title {
            font-size: 15px;
            font-weight: 900;
            background: linear-gradient(135deg, #1a7ad4, #40b4f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 6px
        }

        .menu-btn {
            padding: 3px 10px;
            border-radius: 6px;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            cursor: pointer;
            transition: background .1s;
            white-space: nowrap
        }

        .menu-btn:hover {
            background: rgba(74, 184, 244, 0.12);
            color: var(--text)
        }

        /* Toolbar */
        .toolbar {
            background: var(--panel);
            border-bottom: 1px solid rgba(180, 220, 255, 0.4);
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap
        }

        .tool-group {
            display: flex;
            gap: 2px;
            border-right: 1px solid rgba(180, 220, 255, 0.4);
            padding-right: 6px;
            margin-right: 2px;
            align-items: center
        }

        .tool-group:last-child {
            border: none
        }

        .tool-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(180, 220, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all .1s;
            line-height: 1
        }

        .tool-btn:hover {
            background: rgba(74, 184, 244, 0.15);
            border-color: var(--accent)
        }

        .tool-btn.on {
            background: linear-gradient(180deg, rgba(200, 235, 255, 0.9), rgba(180, 220, 255, 0.85));
            border-color: var(--accent);
            box-shadow: inset 0 1px 3px rgba(80, 160, 220, 0.15)
        }

        .size-input {
            width: 44px;
            height: 24px;
            border: 1px solid rgba(180, 220, 255, 0.4);
            border-radius: 6px;
            padding: 0 6px;
            font-family: inherit;
            font-size: 11px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.6);
            outline: none
        }

        label.tb-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text2)
        }

        /* Color palette */
        .color-row {
            display: flex;
            gap: 3px;
            align-items: center
        }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform .1s;
            flex-shrink: 0
        }

        .color-swatch:hover {
            transform: scale(1.15)
        }

        .color-swatch.on {
            border-color: #000;
            transform: scale(1.15)
        }

        .color-custom {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            border: 2px solid rgba(180, 220, 255, 0.5);
            cursor: pointer;
            background: #fff;
            overflow: hidden
        }

        .color-custom input[type=color] {
            opacity: 0;
            position: absolute;
            width: 26px;
            height: 26px;
            cursor: pointer
        }

        /* Current color preview */
        .cur-colors {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .cur-fg {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            z-index: 1;
            cursor: pointer
        }

        .cur-bg {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            margin-left: -8px;
            margin-top: 6px
        }

        /* Layout */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        /* Tool sidebar */
        .tools-panel {
            width: 42px;
            background: var(--panel);
            border-right: 1px solid rgba(180, 220, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 4px;
            gap: 3px;
            overflow-y: auto;
            flex-shrink: 0
        }

        /* Canvas area */
        .canvas-area {
            flex: 1;
            overflow: auto;
            background: repeating-conic-gradient(rgba(200, 220, 240, 0.4) 0% 25%, rgba(255, 255, 255, 0.3) 0% 50%) 0 0/20px 20px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 12px;
            position: relative
        }

        #paintCanvas {
            cursor: crosshair;
            image-rendering: pixelated;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2)
        }

        /* Status */
        .statusbar {
            height: 22px;
            background: rgba(210, 235, 255, 0.5);
            border-top: 1px solid rgba(180, 220, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            font-size: 10px;
            color: var(--text2);
            flex-shrink: 0
        }

        .statusbar span {
            border-right: 1px solid rgba(180, 220, 255, 0.3);
            padding-right: 8px
        }

        .statusbar span:last-child {
            border: none
        }

        /* Layer panel */
        .layers-panel {
            width: 160px;
            background: var(--panel);
            border-left: 1px solid rgba(180, 220, 255, 0.3);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .lp-head {
            padding: 8px 10px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text2);
            border-bottom: 1px solid rgba(180, 220, 255, 0.2)
        }

        .layer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            cursor: pointer;
            border-bottom: 1px solid rgba(180, 220, 255, 0.1);
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            transition: background .1s
        }

        .layer-item:hover {
            background: rgba(74, 184, 244, 0.06)
        }

        .layer-item.on {
            background: rgba(74, 184, 244, 0.12)
        }

        .layer-vis {
            font-size: 12px;
            cursor: pointer;
            color: var(--text2)
        }

        .layer-thumb {
            width: 28px;
            height: 22px;
            border-radius: 3px;
            border: 1px solid rgba(180, 220, 255, 0.3);
            background: white;
            flex-shrink: 0
        }

        body[data-theme="y2k"] {
            --bg: #0a001a;
            --card: rgba(20, 0, 40, .85);
            --text: #ffccff;
            --text2: #ff88ff;
            --panel: rgba(20, 0, 40, 0.8);
            --glass-b: rgba(255, 0, 255, 0.3);
            --accent: #ff00ff
        }

        body[data-theme="dark-matter"] {
            --bg: #060610;
            --card: rgba(10, 10, 25, .98);
            --text: #ddddf8;
            --text2: #8080d0;
            --panel: rgba(15, 15, 30, 0.9);
            --glass-b: rgba(80, 80, 200, 0.3);
            --accent: #6060ff
        }

        body[data-theme="xp-luna"] {
            --bg: #3a6ea8;
            --card: #fff;
            --text: #000;
            --text2: #316ac5;
            --panel: #d4d0c8;
            --glass-b: #aca899
        }

        body[data-theme="geocities"] {
            --bg: #000080;
            --card: #fff;
            --text: #000;
            --text2: #000080;
            --panel: #c0c0c0;
            --glass-b: #808080;
            --accent: #000080
        }
    </style>
</head>

<body>
    <!-- Menubar -->
    <div class="menubar">
        <div class="menu-title">Painter</div>
        <button class="menu-btn" id="newBtn">New</button>
        <button class="menu-btn" id="openBtn">Open Image</button>
        <button class="menu-btn" id="saveBtn">Save to My Docs</button>
        <button class="menu-btn" id="dlBtn">Download</button>
        <button class="menu-btn" id="postBtn">Post to AeroNet</button>
        <span style="flex:1"></span>
        <button class="menu-btn" id="undoBtn">Undo</button>
        <button class="menu-btn" id="redoBtn">Redo</button>
        <button class="menu-btn" id="clearBtn">Clear</button>
        <input type="file" id="openFile" accept="image/*" style="display:none">
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="tool-group">
            <label class="tb-label">Tool:</label>
            <div class="tool-btn on" data-tool="brush" title="Brush">&#9998;</div>
            <div class="tool-btn" data-tool="pencil" title="Pencil">&#9999;</div>
            <div class="tool-btn" data-tool="eraser" title="Eraser">&#9646;</div>
            <div class="tool-btn" data-tool="fill" title="Fill Bucket">&#9728;</div>
            <div class="tool-btn" data-tool="line" title="Line">&#9135;</div>
            <div class="tool-btn" data-tool="rect" title="Rectangle">&#9645;</div>
            <div class="tool-btn" data-tool="circle" title="Circle/Ellipse">&#9711;</div>
            <div class="tool-btn" data-tool="text" title="Text">T</div>
            <div class="tool-btn" data-tool="eyedrop" title="Eyedropper">&#128065;</div>
            <div class="tool-btn" data-tool="select" title="Select">&#10022;</div>
        </div>
        <div class="tool-group">
            <label class="tb-label">Size:</label>
            <input class="size-input" type="number" id="brushSize" value="4" min="1" max="100">
        </div>
        <div class="tool-group">
            <label class="tb-label">Opacity:</label>
            <input type="range" id="opacitySlider" min="10" max="100" value="100"
                style="width:60px;accent-color:var(--accent)">
        </div>
        <div class="tool-group">
            <label class="tb-label">Colors:</label>
            <!-- Palette -->
            <div class="color-row" id="palette"></div>
            <div class="color-custom" title="Custom color" style="position:relative">
                <input type="color" id="colorPicker" value="#1a88d4">
            </div>
        </div>
        <div class="tool-group cur-colors">
            <div class="cur-fg" id="fgColor" title="Foreground color"></div>
            <div class="cur-bg" id="bgColor" title="Background color" style="background:#fff"></div>
        </div>
        <div class="tool-group">
            <label class="tb-label">Canvas:</label>
            <input class="size-input" type="number" id="canvW" value="800" min="100" max="2000" style="width:52px">
            <span style="font-size:11px;color:var(--text2)">x</span>
            <input class="size-input" type="number" id="canvH" value="600" min="100" max="2000" style="width:52px">
            <div class="tool-btn" id="resizeBtn" title="Resize Canvas" style="font-size:10px">&#8644;</div>
        </div>
    </div>

    <div class="main-layout">
        <!-- Side tools (brush shapes) -->
        <div class="tools-panel">
            <div class="tool-btn on" data-shape="round" title="Round Brush" style="border-radius:50%">&#9679;</div>
            <div class="tool-btn" data-shape="square" title="Square Brush">&#9632;</div>
            <div class="tool-btn" data-shape="spray" title="Spray">&#9832;</div>
            <div style="height:8px"></div>
            <div class="tool-btn" data-effect="blur" title="Blur" style="font-size:11px">Blur</div>
            <div class="tool-btn" data-effect="darken" title="Darken" style="font-size:10px">Dark</div>
            <div class="tool-btn" data-effect="lighten" title="Lighten" style="font-size:10px">Lite</div>
        </div>

        <!-- Canvas area -->
        <div class="canvas-area" id="canvasArea">
            <canvas id="paintCanvas" width="800" height="600"></canvas>
        </div>

        <!-- Layers -->
        <div class="layers-panel">
            <div class="lp-head">Layers</div>
            <div id="layerList">
                <div class="layer-item on">
                    <span class="layer-vis">&#128065;</span>
                    <canvas class="layer-thumb"></canvas>
                    <span>Background</span>
                </div>
            </div>
            <div style="padding:8px;border-top:1px solid rgba(180,220,255,0.2)">
                <button
                    style="width:100%;padding:4px;border-radius:6px;border:1px dashed rgba(180,220,255,0.4);background:none;font-family:inherit;font-size:10px;font-weight:700;color:var(--text2);cursor:pointer"
                    id="addLayerBtn">+ Add Layer</button>
            </div>
        </div>
    </div>

    <div class="statusbar">
        <span id="coordDisplay">X: 0, Y: 0</span>
        <span id="canvasSize">800 x 600</span>
        <span id="toolInfo">Tool: Brush</span>
        <span id="zoomInfo">Zoom: 100%</span>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        let tool = 'brush'; let shape = 'round'; let brushSize = 4; let opacity = 1;
        let fgColor = '#1a88d4'; let bgColor = '#ffffff';
        let drawing = false; let lastX = 0; let lastY = 0;
        let startX = 0; let startY = 0;
        let history = []; let histIdx = -1;
        let snapshot = null;

        const PALETTE = ['#000000', '#808080', '#c0c0c0', '#ffffff', '#ff0000', '#ff8000', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#8000ff', '#ff00ff', '#800000', '#804000', '#808000', '#008000', '#008080', '#000080', '#400080', '#800040', '#1a88d4', '#e84393', '#40d0a0', '#f0c840'];

        // Build palette
        const palEl = document.getElementById('palette');
        PALETTE.forEach(c => {
            const sw = document.createElement('div');
            sw.className = 'color-swatch'; sw.style.background = c; sw.title = c;
            sw.addEventListener('click', e => {
                if (e.shiftKey) { bgColor = c; document.getElementById('bgColor').style.background = c; }
                else { fgColor = c; document.getElementById('fgColor').style.background = c; document.getElementById('colorPicker').value = c; }
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('on'));
                sw.classList.add('on');
            });
            palEl.appendChild(sw);
        });
        document.getElementById('colorPicker').addEventListener('input', e => {
            fgColor = e.target.value;
            document.getElementById('fgColor').style.background = fgColor;
        });
        document.getElementById('fgColor').style.background = fgColor;
        document.getElementById('bgColor').style.background = bgColor;

        // Tool buttons
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('on'));
                btn.classList.add('on');
                tool = btn.dataset.tool;
                document.getElementById('toolInfo').textContent = 'Tool: ' + tool[0].toUpperCase() + tool.slice(1);
                canvas.style.cursor = tool === 'eyedrop' ? 'crosshair' : tool === 'text' ? 'text' : tool === 'fill' ? 'cell' : 'crosshair';
            });
        });
        document.querySelectorAll('[data-shape]').forEach(btn => {
            btn.addEventListener('click', () => { document.querySelectorAll('[data-shape]').forEach(b => b.classList.remove('on')); btn.classList.add('on'); shape = btn.dataset.shape; });
        });

        document.getElementById('brushSize').addEventListener('input', e => brushSize = parseInt(e.target.value) || 4);
        document.getElementById('opacitySlider').addEventListener('input', e => opacity = parseInt(e.target.value) / 100);

        // Save state for undo
        function saveState() {
            history = history.slice(0, histIdx + 1);
            history.push(canvas.toDataURL());
            if (history.length > 40) history.shift();
            histIdx = history.length - 1;
        }
        saveState();

        function undo() { if (histIdx <= 0) return; histIdx--; const img = new Image(); img.src = history[histIdx]; img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }; }
        function redo() { if (histIdx >= history.length - 1) return; histIdx++; const img = new Image(); img.src = history[histIdx]; img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }; }

        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); } if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); } });

        // Drawing
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function drawStroke(x, y) {
            ctx.globalAlpha = opacity;
            if (tool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, brushSize, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                return;
            }
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = fgColor; ctx.fillStyle = fgColor;
            ctx.lineWidth = brushSize; ctx.lineCap = shape === 'square' ? 'square' : 'round'; ctx.lineJoin = 'round';
            if (shape === 'spray') {
                for (let i = 0; i < brushSize * 2; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = Math.random() * brushSize * 3;
                    ctx.beginPath(); ctx.arc(x + Math.cos(a) * r, y + Math.sin(a) * r, 1, 0, Math.PI * 2); ctx.fill();
                }
                return;
            }
            ctx.lineTo(x, y); ctx.stroke();
        }

        canvas.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            const { x, y } = getPos(e);
            drawing = true; lastX = x; lastY = y; startX = x; startY = y;
            if (tool === 'fill') { floodFill(Math.floor(x), Math.floor(y), fgColor); saveState(); drawing = false; return; }
            if (tool === 'eyedrop') { const px = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data; fgColor = `rgb(${px[0]},${px[1]},${px[2]})`; document.getElementById('fgColor').style.background = fgColor; drawing = false; return; }
            if (tool === 'text') {
                const txt = prompt('Enter text:');
                if (txt) { ctx.globalAlpha = opacity; ctx.fillStyle = fgColor; ctx.font = `${brushSize * 4}px Nunito,sans-serif`; ctx.fillText(txt, x, y); saveState(); }
                drawing = false; return;
            }
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = opacity; ctx.strokeStyle = fgColor; ctx.fillStyle = fgColor;
            ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(x, y);
        });

        canvas.addEventListener('mousemove', e => {
            const { x, y } = getPos(e);
            document.getElementById('coordDisplay').textContent = `X: ${Math.round(x)}, Y: ${Math.round(y)}`;
            if (!drawing) return;
            if (tool === 'brush' || tool === 'pencil' || tool === 'eraser') { drawStroke(x, y); lastX = x; lastY = y; }
            else if (tool === 'line' || tool === 'rect' || tool === 'circle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.globalAlpha = opacity; ctx.strokeStyle = fgColor; ctx.fillStyle = 'transparent';
                ctx.lineWidth = brushSize; ctx.beginPath();
                if (tool === 'line') { ctx.moveTo(startX, startY); ctx.lineTo(x, y); }
                else if (tool === 'rect') { ctx.strokeRect(startX, startY, x - startX, y - startY); }
                else if (tool === 'circle') { ctx.ellipse(startX + (x - startX) / 2, startY + (y - startY) / 2, Math.abs(x - startX) / 2, Math.abs(y - startY) / 2, 0, 0, Math.PI * 2); }
                ctx.stroke();
            }
        });

        canvas.addEventListener('mouseup', e => { if (drawing) { saveState(); } drawing = false; ctx.globalAlpha = 1; });
        canvas.addEventListener('mouseleave', () => { if (drawing) { saveState(); } drawing = false; ctx.globalAlpha = 1; });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); });
        canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); });

        // Flood fill
        function floodFill(x, y, fillColor) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const idx = (y * canvas.width + x) * 4;
            const tR = data[idx], tG = data[idx + 1], tB = data[idx + 2], tA = data[idx + 3];
            const fc = hexToRgb(fillColor);
            if (!fc) return;
            if (tR === fc.r && tG === fc.g && tB === fc.b) return;
            const stack = [[x, y]];
            const visited = new Set();
            while (stack.length) {
                const [cx, cy] = stack.pop();
                const key = cy * canvas.width + cx;
                if (visited.has(key) || cx < 0 || cy < 0 || cx >= canvas.width || cy >= canvas.height) continue;
                visited.add(key);
                const i = (cy * canvas.width + cx) * 4;
                if (Math.abs(data[i] - tR) > 30 || Math.abs(data[i + 1] - tG) > 30 || Math.abs(data[i + 2] - tB) > 30) continue;
                data[i] = fc.r; data[i + 1] = fc.g; data[i + 2] = fc.b; data[i + 3] = 255;
                stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
            }
            ctx.putImageData(imgData, 0, 0);
        }
        function hexToRgb(hex) { const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : null; }

        // Canvas resize
        document.getElementById('resizeBtn').addEventListener('click', () => {
            const w = parseInt(document.getElementById('canvW').value) || 800;
            const h = parseInt(document.getElementById('canvH').value) || 600;
            const tmp = canvas.toDataURL(); const img = new Image();
            img.onload = () => { canvas.width = w; canvas.height = h; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0); saveState(); document.getElementById('canvasSize').textContent = w + ' x ' + h; };
            img.src = tmp;
        });

        // Clear
        document.getElementById('clearBtn').addEventListener('click', () => { if (confirm('Clear canvas?')) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); } });

        // Open image
        document.getElementById('openBtn').addEventListener('click', () => document.getElementById('openFile').click());
        document.getElementById('openFile').addEventListener('change', e => {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader(); r.onload = ev => { const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); saveState(); }; img.src = ev.target.result; }; r.readAsDataURL(f);
        });

        // Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            const url = canvas.toDataURL('image/png');
            const name = 'painting_' + Date.now() + '.png';
            const docs = JSON.parse(localStorage.getItem('aeronet_mydocs') || '[]');
            docs.push({ id: Date.now(), name, type: 'image', dataURL: url, ts: Date.now() });
            localStorage.setItem('aeronet_mydocs', JSON.stringify(docs));
            parent.postMessage({ type: 'TOAST', text: 'Saved to My Documents!', icon: '&#127912;' }, '*');
        });

        document.getElementById('dlBtn').addEventListener('click', () => {
            const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'painting_' + Date.now() + '.png'; a.click();
        });

        document.getElementById('postBtn').addEventListener('click', () => {
            const url = canvas.toDataURL('image/png');
            const post = { id: Date.now(), isOwn: true, text: 'Created in Painter &#127912;', type: 'image', image: url, likes: 0, liked: false, comments: [], tags: ['#painter', '#art'], ts: Date.now(), showComments: false };
            parent.postMessage({ type: 'POST_TO_FEED', post }, '*');
            parent.postMessage({ type: 'TOAST', text: 'Painting posted to AeroNet!', icon: '&#9993;' }, '*');
        });

        // New
        document.getElementById('newBtn').addEventListener('click', () => { if (confirm('Start new canvas?')) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); history = []; histIdx = -1; saveState(); } });

        // Add layer (visual only)
        document.getElementById('addLayerBtn').addEventListener('click', () => {
            const idx = document.getElementById('layerList').children.length + 1;
            const item = document.createElement('div'); item.className = 'layer-item';
            item.innerHTML = `<span class="layer-vis">&#128065;</span><canvas class="layer-thumb"></canvas><span>Layer ${idx}</span>`;
            document.getElementById('layerList').insertBefore(item, document.getElementById('layerList').firstChild);
            parent.postMessage({ type: 'TOAST', text: 'Layer added (drawing on background layer)', icon: '&#127912;' }, '*');
        });

        window.addEventListener('message', e => { if (e.data?.type === 'THEME_CHANGE') document.body.dataset.theme = e.data.theme; });
        document.body.dataset.theme = parent.document?.body?.dataset?.theme || 'frutiger-aero';
        document.getElementById('canvasSize').textContent = canvas.width + ' x ' + canvas.height;
    </script>
</body>

</html>
