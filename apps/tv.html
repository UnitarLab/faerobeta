<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #1a88d4;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #fff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .tv-frame {
            width: 90%;
            height: 85%;
            max-width: 1000px;
            background: #2a2a2a;
            border: 20px solid #1a1a1a;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(255, 255, 255, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .tv-screen-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 1);
        }

        .tv-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            z-index: 10;
        }

        #tvIframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .tv-knobs {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }

        .knob {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #444, #222);
            border: 2px solid #555;
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .knob:hover {
            transform: rotate(30deg);
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s;
        }

        .static {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUic898I/giphy.gif');
            opacity: 0.05;
            pointer-events: none;
        }

        .status-text {
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        .fallback-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            z-index: 100;
            display: none;
        }

        .fallback-btn:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <div class="tv-frame">
        <div class="tv-screen-container">
            <div class="tv-overlay"></div>
            <div class="static"></div>
            <div class="loading-screen" id="loader">
                <div class="status-text" id="status">Tuning Signal...</div>
                <button class="fallback-btn" id="fallback"
                    onclick="window.open('https://00s.myretrotvs.com/', '_blank')">Manual Tuner Required (Open
                    Externally)</button>
            </div>
            <iframe id="tvIframe"></iframe>
        </div>
        <div class="tv-knobs">
            <div class="knob"></div>
            <div class="knob"></div>
        </div>
    </div>

    <script>
        const targetUrl = 'https://00s.myretrotvs.com/';
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const iframe = document.getElementById('tvIframe');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const fallback = document.getElementById('fallback');

        async function initTv() {
            try {
                status.innerText = "Bypassing Encrypted Signal...";
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error("Proxy error");

                let html = await response.text();

                // Inject <base> tag to fix relative paths
                const baseTag = `<base href="${targetUrl}">`;
                if (html.includes('<head>')) {
                    html = html.replace('<head>', '<head>' + baseTag);
                } else {
                    html = baseTag + html;
                }

                // Add simple script to handle links inside the proxy?
                // Actually, srcdoc is enough let's see.

                iframe.srcdoc = html;

                iframe.onload = () => {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 500);
                    }, 2000);
                };
            } catch (err) {
                console.error(err);
                status.innerText = "SIGNAL SCRAMBLED";
                fallback.style.display = "block";
            }
        }

        initTv();

        // Safety timeout
        setTimeout(() => {
            if (loader.style.display !== 'none') {
                status.innerText = "CONNECTION TIMEOUT";
                fallback.style.display = "block";
            }
        }, 8000);
    </script>
</body>

</html>
