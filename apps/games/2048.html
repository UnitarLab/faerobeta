<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 — Aero Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at 40% 25%, #1a1008 0%, #0c0804 50%, #040201 100%);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Exo 2',sans-serif; overflow:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(circle at 20% 40%, rgba(255,160,0,0.07) 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,100,0,0.05) 0%, transparent 40%),
      radial-gradient(circle at 55% 10%, rgba(255,200,50,0.05) 0%, transparent 35%);
    pointer-events:none;
  }
  .orb { position:fixed; border-radius:50%; filter:blur(70px); opacity:0.2; pointer-events:none; animation:drift 10s ease-in-out infinite alternate; }
  .orb1 { width:400px; height:400px; background:radial-gradient(circle,#ff8800,transparent); top:-120px; left:-100px; }
  .orb2 { width:300px; height:300px; background:radial-gradient(circle,#ffcc00,transparent); bottom:-80px; right:-60px; animation-delay:-5s; }
  .orb3 { width:200px; height:200px; background:radial-gradient(circle,#ff5500,transparent); top:20%; right:3%; animation-delay:-3s; }
  @keyframes drift { from{transform:translateY(0);} to{transform:translateY(28px);} }

  h1 {
    font-family:'Orbitron',sans-serif; font-size:2rem; font-weight:900; color:transparent;
    background:linear-gradient(180deg,#ffffff 0%,#ffdd88 50%,#ff8800 100%);
    -webkit-background-clip:text; background-clip:text; letter-spacing:0.35em;
    filter:drop-shadow(0 0 20px rgba(255,150,0,0.7)); margin-bottom:1rem;
  }

  .top-row { display:flex; gap:2rem; align-items:center; margin-bottom:1rem; }
  .score-group { display:flex; gap:1rem; }
  .hud-panel {
    background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));
    border:1px solid rgba(255,180,50,0.25); border-radius:14px; padding:0.5rem 1.2rem;
    text-align:center; backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(180,100,0,0.2),inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .hud-label { font-size:0.6rem; letter-spacing:0.2em; color:rgba(255,200,100,0.65); text-transform:uppercase; }
  .hud-value { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:700; color:#fff; text-shadow:0 0 15px rgba(255,160,0,0.8); min-width:80px; }

  .btn {
    font-family:'Exo 2',sans-serif; font-size:0.75rem; font-weight:600;
    letter-spacing:0.15em; text-transform:uppercase; padding:0.6rem 1.4rem;
    border:none; border-radius:50px; cursor:pointer; position:relative; overflow:hidden; transition:all 0.2s;
    background:linear-gradient(145deg,rgba(220,130,0,0.75),rgba(150,70,0,0.55));
    color:#fff; border:1px solid rgba(255,180,60,0.45);
    box-shadow:0 4px 15px rgba(180,100,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent); border-radius:50px; pointer-events:none; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,150,0,0.5); }

  .board-wrapper {
    border-radius:20px; padding:3px;
    background:linear-gradient(135deg,rgba(255,180,50,0.35),rgba(150,60,0,0.2),rgba(255,150,30,0.25));
    box-shadow:0 0 0 1px rgba(220,140,0,0.2),0 20px 60px rgba(180,80,0,0.4);
    position:relative;
  }
  .board-wrapper::before {
    content:''; position:absolute; top:3px; left:3px; right:3px; height:40%;
    background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 100%);
    border-radius:17px 17px 50% 50%; pointer-events:none; z-index:2;
  }

  #board {
    display:grid; grid-template-columns:repeat(4,1fr);
    gap:10px; padding:14px; border-radius:17px;
    background:rgba(30,15,5,0.85); backdrop-filter:blur(4px);
    width:380px; height:380px;
  }

  .cell {
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif; font-weight:700; cursor:default;
    position:relative; overflow:hidden; transition:transform 0.08s ease;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
    user-select:none;
  }
  .cell-value {
    position:relative; z-index:2;
    font-size:1.4rem; line-height:1;
  }
  .cell.pop { animation:pop 0.15s ease; }
  @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }
  .cell.new-tile { animation:appear 0.18s ease; }
  @keyframes appear { 0%{transform:scale(0);opacity:0;} 100%{transform:scale(1);opacity:1;} }

  /* gloss overlay all cells */
  .cell::after {
    content:''; position:absolute; top:0; left:0; right:0; height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);
    border-radius:10px 10px 50% 50%; pointer-events:none;
  }

  .hint { font-size:0.7rem; color:rgba(255,180,80,0.45); letter-spacing:0.1em; text-align:center; margin-top:0.8rem; }

  .overlay {
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(4,2,0,0.82); backdrop-filter:blur(8px); z-index:100; gap:1rem;
  }
  .overlay-title { font-family:'Orbitron',sans-serif; font-size:2rem; font-weight:900; color:#fff; text-shadow:0 0 30px rgba(255,160,0,0.9); letter-spacing:0.15em; }
  .overlay-sub { font-size:0.9rem; color:rgba(255,200,100,0.8); letter-spacing:0.1em; }

  /* Tile color map */
  .t0    { background:rgba(60,30,10,0.5); }
  .t2    { background:linear-gradient(135deg,#2a1800,#3d2200); color:#ffcc88; text-shadow:0 0 8px rgba(255,160,50,0.5); }
  .t4    { background:linear-gradient(135deg,#3d2200,#5c3300); color:#ffd088; text-shadow:0 0 10px rgba(255,180,60,0.6); }
  .t8    { background:linear-gradient(135deg,#6b2800,#8f3800); color:#ffe0aa; text-shadow:0 0 12px rgba(255,180,0,0.7); box-shadow:0 0 15px rgba(220,100,0,0.3),inset 0 1px 0 rgba(255,200,100,0.2); }
  .t16   { background:linear-gradient(135deg,#8f3000,#b84000); color:#fff0cc; text-shadow:0 0 14px rgba(255,200,0,0.8); box-shadow:0 0 18px rgba(255,120,0,0.35),inset 0 1px 0 rgba(255,220,120,0.25); }
  .t32   { background:linear-gradient(135deg,#b04000,#d85000); color:#ffffff; text-shadow:0 0 15px rgba(255,220,0,1); box-shadow:0 0 22px rgba(255,140,0,0.4),inset 0 1px 0 rgba(255,230,140,0.3); }
  .t64   { background:linear-gradient(135deg,#cc5000,#ff6600); color:#ffffff; text-shadow:0 0 18px rgba(255,240,100,1); box-shadow:0 0 28px rgba(255,160,0,0.5),inset 0 1px 0 rgba(255,240,180,0.35); }
  .t128  { background:linear-gradient(135deg,#dd7700,#ff9900); color:#ffffff; text-shadow:0 0 20px #fff; box-shadow:0 0 32px rgba(255,180,0,0.55),inset 0 1px 0 rgba(255,255,200,0.4); font-size:1.1rem; }
  .t256  { background:linear-gradient(135deg,#ddaa00,#ffcc00); color:#fff; text-shadow:0 0 22px #fff,0 0 40px rgba(255,220,0,1); box-shadow:0 0 40px rgba(255,220,0,0.6),inset 0 1px 0 rgba(255,255,220,0.45); font-size:1rem; }
  .t512  { background:linear-gradient(135deg,#88cc00,#aaff00); color:#fff; text-shadow:0 0 25px #fff,0 0 50px rgba(200,255,0,1); box-shadow:0 0 45px rgba(180,255,0,0.65),inset 0 1px 0 rgba(255,255,200,0.5); font-size:1rem; }
  .t1024 { background:linear-gradient(135deg,#00aacc,#00ddff); color:#fff; text-shadow:0 0 25px #fff,0 0 60px rgba(0,220,255,1); box-shadow:0 0 50px rgba(0,200,255,0.7),inset 0 1px 0 rgba(200,255,255,0.5); font-size:0.85rem; }
  .t2048 { background:linear-gradient(135deg,#8800ff,#dd00ff,#ff8800); color:#fff; text-shadow:0 0 30px #fff; box-shadow:0 0 60px rgba(200,0,255,0.8),inset 0 1px 0 rgba(255,200,255,0.5); font-size:0.8rem; animation:rainbow 1.5s linear infinite; }
  @keyframes rainbow { 0%{filter:hue-rotate(0deg);} 100%{filter:hue-rotate(360deg);} }
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<h1>2048</h1>
<div class="top-row">
  <div class="score-group">
    <div class="hud-panel"><div class="hud-label">Score</div><div class="hud-value" id="score">0</div></div>
    <div class="hud-panel"><div class="hud-label">Best</div><div class="hud-value" id="best">0</div></div>
  </div>
  <button class="btn" onclick="newGame()">NEW GAME</button>
</div>
<div class="board-wrapper">
  <div id="board"></div>
</div>
<div class="hint">↑ ↓ ← → or WASD — Slide tiles &nbsp;|&nbsp; Reach 2048!</div>

<div class="overlay" id="overlay">
  <div class="overlay-title">2048</div>
  <div class="overlay-sub">Merge tiles to reach 2048</div>
  <button class="btn" onclick="startGame()">START GAME</button>
</div>

<script>
let grid, score, best=0, running=false, won=false;

function newGame() { startGame(); }

function startGame() {
  document.getElementById('overlay').style.display='none';
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0; won=false; running=true;
  addTile(); addTile();
  renderBoard();
}

function addTile() {
  const empty=[];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  return [r,c];
}

function renderBoard(newPos=null, mergedPos=[]) {
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    const v=grid[r][c];
    const cell=document.createElement('div');
    const cls=['cell',`t${Math.min(v,2048)}`];
    if(newPos&&newPos[0]===r&&newPos[1]===c) cls.push('new-tile');
    if(mergedPos.some(([mr,mc])=>mr===r&&mc===c)) cls.push('pop');
    cell.className=cls.join(' ');
    if(v>0) {
      const span=document.createElement('span');
      span.className='cell-value'; span.textContent=v;
      cell.appendChild(span);
    }
    board.appendChild(cell);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
}

function slide(row) {
  let arr=row.filter(v=>v!==0), merged=[], mergedIdx=[];
  for(let i=0;i<arr.length-1;i++) {
    if(arr[i]===arr[i+1]) {
      arr[i]*=2; score+=arr[i]; if(score>best)best=score;
      if(arr[i]===2048&&!won) { won=true; }
      mergedIdx.push(i);
      arr.splice(i+1,1);
    }
  }
  while(arr.length<4) arr.push(0);
  return {arr,mergedIdx};
}

function move(dir) {
  if(!running) return;
  let moved=false;
  const mergedCells=[];
  let newG=grid.map(r=>[...r]);

  const processRow=(row,r,colsFn)=>{
    const {arr,mergedIdx}=slide(row);
    mergedIdx.forEach(i=>mergedCells.push([r,colsFn(i)]));
    return arr;
  };

  if(dir==='left') {
    for(let r=0;r<4;r++){
      const res=processRow([...grid[r]],r,i=>i);
      if(res.join()!==grid[r].join()) moved=true;
      newG[r]=res;
    }
  } else if(dir==='right') {
    for(let r=0;r<4;r++){
      const rev=[...grid[r]].reverse();
      const res=processRow(rev,r,i=>3-i);
      if(res.join()!==grid[r].join()) moved=true;
      newG[r]=res.reverse();
    }
  } else if(dir==='up') {
    for(let c=0;c<4;c++){
      const col=grid.map(row=>row[c]);
      const res=processRow(col,c,i=>i); // r=c here is a placeholder
      for(let r=0;r<4;r++){
        if(newG[r][c]!==res[r]){moved=true;}
        newG[r][c]=res[r];
      }
      // fix mergedCells
    }
    // redo up properly
    if(dir==='up') {
      newG=grid.map(r=>[...r]); mergedCells.length=0;
      for(let c=0;c<4;c++){
        const col=grid.map(row=>row[c]);
        const {arr,mergedIdx}=slide(col);
        mergedIdx.forEach(i=>mergedCells.push([i,c]));
        for(let r=0;r<4;r++){if(newG[r][c]!==arr[r])moved=true; newG[r][c]=arr[r];}
      }
    }
  } else if(dir==='down') {
    newG=grid.map(r=>[...r]); mergedCells.length=0;
    for(let c=0;c<4;c++){
      const col=grid.map(row=>row[c]).reverse();
      const {arr,mergedIdx}=slide(col);
      mergedIdx.forEach(i=>mergedCells.push([3-i,c]));
      const unrev=arr.reverse();
      for(let r=0;r<4;r++){if(newG[r][c]!==unrev[r])moved=true; newG[r][c]=unrev[r];}
    }
  }

  if(moved) {
    grid=newG;
    const np=addTile();
    renderBoard(np,mergedCells);
    if(won) showWin();
    else if(isGameOver()) showLose();
  }
}

function isGameOver() {
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if(grid[r][c]===0) return false;
    if(c<3&&grid[r][c]===grid[r][c+1]) return false;
    if(r<3&&grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}

function showWin() {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="overlay-title">YOU WIN! 🌟</div><div class="overlay-sub">Score: ${score}</div><button class="btn" onclick="startGame()">PLAY AGAIN</button>`;
  ov.style.display='flex'; running=false;
}

function showLose() {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="overlay-title">GAME OVER</div><div class="overlay-sub">Score: ${score} &nbsp;|&nbsp; Best: ${best}</div><button class="btn" onclick="startGame()">TRY AGAIN</button>`;
  ov.style.display='flex'; running=false;
}

const dirMap={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down',A:'left',D:'right',W:'up',S:'down'};
window.addEventListener('keydown',e=>{
  if(dirMap[e.key]){move(dirMap[e.key]);if(e.key.startsWith('Arrow'))e.preventDefault();}
});

// Touch
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});
</script>
</body>
</html>
